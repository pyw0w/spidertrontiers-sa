[item-description]
spidertron_mk3=Этот паук - бог. Способен пережить ядерный взрыв в лицо, а его сетка оборудования кажется бесконечной.
spidertron_mk2=Черный паук, который будет преследовать кусак в их самых страшных кошмарах.
spidertron_mk0=Создан для спецопераций. Имеет 3 типа оружия; разнообразие - залог успеха.
spidertron_mkn1=Скромное начало. Ваш первый универсальный Паукотрон: слабый и неуклюжий.
prototype_spidertron=Груда ужасно подогнанных деталей; выглядит и работает как Паукотрон, но едва-едва.
assault_spidertron_mk1=Основан на вашем первом прототипе и по сути ужасен... Но пушек стало больше.
assault_spidertron_mk2=Довольно неплох в дальнем бою, но в ближнем этот штурмовик хрупок, как стеклянная фигурка.
bulwark_spidertron_mk1=Конечно, он отлично бронирован. Но и чертовски медленный...
bulwark_spidertron_mk2=Вам понадобилось больше ног, чтобы выдержать этот гигантский вес. Его внешний вид вызывает у вас мурашки.
scout_spidertron_mk1=Ловкости вам не занимать.
scout_spidertron_mk2=Радар на ножках. На четырех ножках!
voyage_spidertron_mk1=Перевозите базу или готовитесь к штурму? Этот Паукотрон для вас.
voyage_spidertron_mk2=Давайте на этом тише ехать - дальше будем.

