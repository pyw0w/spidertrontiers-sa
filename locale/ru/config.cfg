[technology-description]
spidertron_mk3=Вершина эволюции Паукотронов. Сенсоры, броня и ракетные установки доведены до невообразимого совершенства.
spidertron_mk2=Улучшение сетки оборудования и бронированного корпуса привело к этому прорыву.
spidertron_mk0=Сочетание бронированного корпуса, пушки, пулемета, ракетной установки и 6 ног. Вы сами об этом просили.
spidertron_mkn1=Ваша первая попытка совместить прочность, огневую мощь и другие функции. Стоило ли оно того? Наверное. Нужно ли было это делать? Нет.
prototype_spidertron=Вы скрутили несколько болтов и гаек, и это стало похоже на паука. Так вы его и создали.
assault_spidertron_mk1=«Пушки - это круто», - прошептал голос в вашем сне, и вы решили действовать... Что могло пойти не так?
assault_spidertron_mk2=«Больше - значит лучше» - такова была философия создания этого Паукотрона.
bulwark_spidertron_mk1=В порыве ярости вы ударили по стальной балке. Было больно. И тогда вы задумались: а что если сделать Паукотрон из чего-то настолько же твердого?
bulwark_spidertron_mk2=Не будем забегать вперед, но вы начали использовать поперечные балки для усиления корпуса этих Паукотронов!
scout_spidertron_mk1=Установив стальной корпус на ноги, вы добавили сверху радар. Настоящее порождение инженерного безумия.
scout_spidertron_mk2=Одного радара было мало. Без комментариев.
voyage_spidertron_mk1=А что, если вместо тяжелой брони нагрузить эти паучьи лапы ресурсами?
voyage_spidertron_mk2=Изобретение усиленных ног позволяет этому Паукотрону нести на себе половину вашей фабрики.

[mod-setting-name]
show-spidertron-legs=Показывать ноги Паукотронов
stack-spidertron-recipes=Последовательные рецепты Паукотронов
spidertrontiers-use-fuel=Паукотроны используют топливо

[mod-setting-description]
show-spidertron-legs=Эту опцию можно отключить для игроков с арахнофобией или для тех, кому просто неприятно на них смотреть. Можно переключать без вреда для сохранений.
stack-spidertron-recipes=По умолчанию каждый новый Паукотрон требует модель предыдущего поколения. Если вам не нравится такая система, отключите этот параметр, и рецепты будут требовать просто железо.